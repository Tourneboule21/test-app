apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iot-p3-ingress
spec:
  rules:
  - host: test-app.com
    http:
      paths:
      - path: /
        pathType: "Prefix"
        backend:
          service:
            name: test-app-service
            port:
              number: 8083
